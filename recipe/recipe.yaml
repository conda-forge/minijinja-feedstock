# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.20.0"
  maturin_min: "1.5"
  python_check_max: "3.14"
  # rattler-build doesn't define SP_DIR during test, and chokes on strings starting with %
  unix_sp_dir: $(python -c "print(__import__('site').getsitepackages()[-1])")
  win_sp_dir: Lib\site-packages
  sp_dir: ${{ unix_sp_dir if unix else "%PREFIX%\\" ~ win_sp_dir }}
  abi3_bin: _lowlevel.${{ "abi3.so" if unix else "pyd" }}

package:
  name: minijinja
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/minijinja/minijinja-${{ version }}.tar.gz
  sha256: 93364945c36a2b44d8b62af068ff0c11c8b3f3fa2b11599190249bd4cd2c31ad

build:
  number: 0
  skip: is_abi3 and not is_python_min
  script:
    env:
      # for windows
      # ⚠ warning Error reading output: Custom { kind: InvalidData, error: "stream did not contain valid UTF-8" }
      PYTHONIOENCODING: utf-8
    content:
      - cargo-bundle-licenses --format=yaml --output=THIRDPARTY.yml
      - ${{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps --disable-pip-version-check
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
  host:
    - maturin >=${{ maturin_min }}
    - pip
    - python
    - if: is_abi3
      then:
        - python-abi3
  run:
    - python

tests:
  - if: is_abi3
    then:
      python:
        imports: minijinja
        pip_check: true
        python_version:
          - ${{ python_min }}.*
          - ${{ python_check_max }}.*
    else:
      python:
        imports: minijinja
        pip_check: true
  - files:
      source:
        - minijinja-py/tests/
    requirements:
      run:
        - mypy
        - pytest-cov
        - if: is_abi3
          then:
            - abi3audit
    script:
      - cd minijinja-py
      - coverage run --source minijinja --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=84
      - mypy -p minijinja
      - if: is_abi3
        then:
          - cd "${{ sp_dir }}" && cd minijinja
          - abi3audit -s -v --assume-minimum-abi3 ${{ python_min }} ${{ abi3_bin }}

about:
  summary: An experimental Python binding of the Rust MiniJinja template engine.
  license: Apache-2.0
  license_file:
    - LICENSE
    - minijinja/LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/minijinja
  repository: https://github.com/mitsuhiko/minijinja

extra:
  recipe-maintainers:
    - synapticarbors
    - bollwyvl
